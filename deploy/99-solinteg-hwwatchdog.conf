; Local override, installed to /etc/systemd/system.conf.d/99-solinteg-hwwatchdog.conf. Part
; of the resilience plan (2026-07-07): this is the HARDWARE watchdog (kernel/BIOS level via
; the NUC's iTCO chipset timer) - distinct from solinteg-watchdog.timer, which is a software
; safety net that only catches a dead dispatch_loop.py, not a hung kernel or a wedged systemd.
;
; RuntimeWatchdogSec: systemd pings /dev/watchdog while healthy; if PID1 itself ever stops
; responding for this long, the hardware forces a reboot with no software involved at all.
; RebootWatchdogSec: backstop for the reboot path itself hanging (e.g. a stuck unmount).
;
; Requires iTCO_wdt loaded first - see solinteg-hwwatchdog-load.service in this same directory
; in deploy/ (NOT a plain modules-load.d entry - the kernel blacklists this module by default
; and systemd-modules-load.service honors that blacklist, so the module needs force-loading via
; plain modprobe instead; see deploy/README.md §12c). Confirm after installing: `ls /dev/watchdog`
; should exist, and `systemctl show -p RuntimeWatchdogUSec` should reflect this value.
[Manager]
RuntimeWatchdogSec=1min
RebootWatchdogSec=10min
